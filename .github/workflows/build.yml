name: Build

on:
  push:
    branches: [ "main" ]
    paths-ignore: [ "**/*.md" ]
    tags:
      - "v*.*.*"
      - "bom-v*.*.*"
      - "api-v*.*.*"
      - "framework-v*.*.*"
      - "extensions-v*.*.*"
  pull_request:
    branches: [ "main" ]
    paths-ignore: [ "**/*.md" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      # Build BOM if: it's a BOM/general release tag, OR BOM files changed
      bom: ${{ (github.ref_type == 'tag' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/bom-v'))) || (github.ref_type != 'tag' && steps.filter.outputs.bom == 'true') }}

      # Build API if: it's an API/general release tag, OR API files changed, OR BOM changed (dependency)
      api: ${{ (github.ref_type == 'tag' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/api-v'))) || (github.ref_type != 'tag' && (steps.filter.outputs.api == 'true' || steps.filter.outputs.bom == 'true')) }}

      # Build Framework if: it's a Framework/general release tag, OR Framework files changed, OR any upstream dependency (API, BOM) changed
      framework: ${{ (github.ref_type == 'tag' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/framework-v'))) || (github.ref_type != 'tag' && (steps.filter.outputs.framework == 'true' || steps.filter.outputs.api == 'true' || steps.filter.outputs.bom == 'true')) }}

      # Build Extensions if: it's an Extensions/general release tag, OR Extensions files changed, OR any upstream dependency (API, BOM) changed
      extensions: ${{ (github.ref_type == 'tag' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/extensions-v'))) || (github.ref_type != 'tag' && (steps.filter.outputs.extensions == 'true' || steps.filter.outputs.api == 'true' || steps.filter.outputs.bom == 'true')) }}
    
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.ref_type != 'tag'
        with:
          filters: |
            bom:
              - 'bom/**'
              - '.github/workflows/build.yml'
              - '.github/workflows/maven.yml'
            api:
              - 'api/**'
              - '.github/workflows/build.yml'
              - '.github/workflows/maven.yml'
            framework:
              - 'framework/**'
              - '.github/workflows/build.yml'
              - '.github/workflows/maven.yml'
              - '.github/workflows/docker.yml'
            extensions:
              - 'extensions/**'
              - '.github/workflows/build.yml'
              - '.github/workflows/maven.yml'

  build-bom:
    needs: changes
    if: ${{ needs.changes.outputs.bom == 'true' }}
    uses: ./.github/workflows/maven.yml
    permissions:
      contents: write
      security-events: write
      actions: read
      packages: read   
    with:
      pom-file: "bom/pom.xml"
      build-artifact-name: bom-artifact
      build-artifact-path: bom/target/
      install-to-local-repo: true

  publish-bom:
    needs: build-bom
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.ref_type == 'tag' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/bom-v')))
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: bom-artifact
          path: bom/target/
      - name: Publish to GitHub Packages
        run: mvn -f bom/pom.xml deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-api:
    needs: [changes, build-bom]
    if: |
      always() &&
      (needs.build-bom.result == 'success' || needs.build-bom.result == 'skipped') &&
      needs.changes.outputs.api == 'true'
    uses: ./.github/workflows/maven.yml
    permissions:
      contents: write
      security-events: write
      actions: read
      packages: read
    with:
      pom-file: "api/pom.xml"
      build-artifact-name: api-artifact
      build-artifact-path: api/target/
      install-to-local-repo: true
      download-dependencies-artifacts: true

  publish-api:
    needs: build-api
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.ref_type == 'tag' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/api-v')))
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Publish to GitHub Packages
        run: mvn -f api/pom.xml deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-framework:
    needs: [changes, build-api]
    if: |
      always() &&
      (needs.build-api.result == 'success' || needs.build-api.result == 'skipped') &&
      needs.changes.outputs.framework == 'true'
    uses: ./.github/workflows/maven.yml
    permissions:
      contents: write
      security-events: write
      actions: read
      packages: read
    with:
      pom-file: "framework/pom.xml"
      build-artifact-name: framework-artifact
      build-artifact-path: framework/target/
      download-dependencies-artifacts: true

  docker-framework:
    needs: build-framework
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/docker.yml
    with:
      build-artifact-name: framework-artifact
      build-artifact-path: framework/target/
      docker-file-path: ./framework/Dockerfile
      container-image-title: framework
      image-name: ${{ github.repository }}-framework

  build-extensions:
    needs: [changes, build-api]
    if: |
      always() &&
      (needs.build-api.result == 'success' || needs.build-api.result == 'skipped') &&
      needs.changes.outputs.extensions == 'true'
    uses: ./.github/workflows/maven.yml
    permissions:
      contents: write
      security-events: write
      actions: read
      packages: read
    with:
      pom-file: "extensions/pom.xml"
      build-artifact-name: extensions-artifact
      build-artifact-path: extensions/**/target/
      download-dependencies-artifacts: true

  release:
    needs: [build-bom, build-api, build-framework, docker-framework, build-extensions]
    if: |
      always() &&
      github.ref_type == 'tag' &&
      (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/framework-v') || startsWith(github.ref, 'refs/tags/extensions-v') || startsWith(github.ref, 'refs/tags/bom-v') || startsWith(github.ref, 'refs/tags/api-v')) &&
      (needs.build-framework.result == 'success' || needs.build-framework.result == 'skipped') &&
      (needs.docker-framework.result == 'success' || needs.docker-framework.result == 'skipped') &&
      (needs.build-extensions.result == 'success' || needs.build-extensions.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      isFrameworkRelease: ${{ needs.build-framework.result == 'success' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/framework-v')) }}
      isExtensionsRelease: ${{ needs.build-extensions.result == 'success' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/extensions-v')) }}
    steps:
      - uses: actions/checkout@v6
      - name: Download framework artifacts
        if: ${{ needs.release.outputs.isFrameworkRelease == 'true' }}
        uses: actions/download-artifact@v7
        with:
          name: framework-artifact
          path: framework-artifacts/
      - name: Download extensions artifacts
        if: ${{ needs.release.outputs.isExtensionsRelease == 'true' }}
        uses: actions/download-artifact@v7
        with:
          name: extensions-artifact
          path: extensions-artifacts/
      - name: Upload framework JAR to release
        if: ${{ needs.release.outputs.isFrameworkRelease == 'true' }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: framework-artifacts/*.jar
          file_glob: true
          tag: ${{ github.ref }}
          overwrite: true
      - name: Upload extension JARs to release
        if: ${{ needs.release.outputs.isExtensionsRelease == 'true' }}
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: extensions-artifacts/**/*-all.jar
          file_glob: true
          tag: ${{ github.ref }}
          overwrite: true
