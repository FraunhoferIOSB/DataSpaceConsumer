name: Build

on:
  push:
    branches: [ "main" ]
    paths-ignore: [ "**/*.md" ]
    tags:
      - "v*.*"
      - "v*.*.*"
  pull_request:
    branches: [ "main" ]
    paths-ignore: [ "**/*.md" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      bom: ${{ steps.filter.outputs.bom }}
      api: ${{ steps.filter.outputs.api }}
      framework: ${{ steps.filter.outputs.framework }}
      extensions: ${{ steps.filter.outputs.extensions }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            bom:
              - 'bom/**'
              - '.github/workflows/build.yml'
            api:
              - 'api/**'
              - '.github/workflows/build.yml'
            framework:
              - 'framework/**'
              - '.github/workflows/build.yml'
            extensions:
              - 'extensions/**'
              - '.github/workflows/build.yml'

  build-bom:
    needs: changes
    if: ${{ needs.changes.outputs.bom == 'true' }}
    uses: ./.github/workflows/maven.yml
    permissions:
      contents: write
      security-events: write
      actions: read   
    with:
      pom-file: "bom/pom.xml"
      build-artifact-name: bom-artifact
      build-artifact-path: bom/target/
      install-to-local-repo: true

  publish-bom:
    needs: build-bom
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: bom-artifact
          path: bom/target/
      - name: Publish to GitHub Packages
        run: mvn -f bom/pom.xml deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-api:
    needs: [changes, build-bom]
    if: |
      always() &&
      (needs.build-bom.result == 'success' || needs.build-bom.result == 'skipped') &&
      needs.changes.outputs.api == 'true'
    uses: ./.github/workflows/maven.yml
    permissions:
      contents: write
      security-events: write
      actions: read   
    with:
      pom-file: "api/pom.xml"
      build-artifact-name: api-artifact
      build-artifact-path: api/target/
      install-to-local-repo: true
      download-dependencies-artifacts: true

  publish-api:
    needs: build-api
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Publish to GitHub Packages
        run: mvn -f api/pom.xml deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-framework:
    needs: [changes, build-api]
    if: |
      always() &&
      (needs.build-api.result == 'success' || needs.build-api.result == 'skipped') &&
      needs.changes.outputs.framework == 'true'
    uses: ./.github/workflows/maven.yml
    permissions:
      contents: write
      security-events: write
      actions: read   
    with:
      pom-file: "framework/pom.xml"
      build-artifact-name: framework-artifact
      build-artifact-path: framework/target/
      download-dependencies-artifacts: true

  docker-framework:
    needs: build-framework
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/docker.yml
    with:
      build-artifact-name: framework-artifact
      build-artifact-path: framework/target/
      docker-file-path: ./framework/Dockerfile
      container-image-title: framework
      image-name: ${{ github.repository }}-framework

  build-extensions:
    needs: [changes, build-api]
    if: |
      always() &&
      (needs.build-api.result == 'success' || needs.build-api.result == 'skipped') &&
      needs.changes.outputs.extensions == 'true'
    uses: ./.github/workflows/maven.yml
    permissions:
      contents: write
      security-events: write
      actions: read   
    with:
      pom-file: "extensions/pom.xml"
      build-artifact-name: extensions-artifact
      build-artifact-path: extensions/target/
      download-dependencies-artifacts: true
